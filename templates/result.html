<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Résultat</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5 text-center" style="max-width:500px">
  <div class="card shadow p-4">
    <h4>Résultat de l'analyse</h4>
    <img src="{{ img_path }}" class="img-fluid rounded my-3" style="max-height:250px">

    <h2 class="fw-bold {{ 'text-danger' if result == 'Malignant' else 'text-success' }}">
      {{ result }}
    </h2>
    <p class="fs-5">Probabilité : <strong>{{ prob }}%</strong></p>

    <a href="/predict" class="btn btn-primary me-2">Nouvelle analyse</a>
    <a href="/patients" class="btn btn-secondary">Voir les patients</a>
  </div>
</div>
</body>
</html>
